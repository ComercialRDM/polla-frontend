<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#facc15"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Soccer ball -->
  <circle cx="256" cy="232" r="120" fill="#0f172a"/>
  <circle cx="256" cy="232" r="112" fill="#ffffff"/>

  <!-- Pentagon pattern -->
  <g fill="#0f172a">
    <polygon points="256,150 296,180 280,228 232,228 216,180"/>
    <polygon points="190,260 220,300 196,340 150,330 142,282"/>
    <polygon points="322,260 370,282 362,330 316,340 292,300"/>
    <circle cx="256" cy="232" r="112" fill="none" stroke="#0f172a" stroke-width="6"/>
  </g>

  <!-- Colombia flag stripe -->
  <g>
    <rect x="76" y="392" width="360" height="28" rx="6" fill="#FCD116"/>
    <rect x="76" y="420" width="360" height="14" rx="4" fill="#003893"/>
    <rect x="76" y="434" width="360" height="14" rx="4" fill="#CE1126"/>
  </g>
</svg>
